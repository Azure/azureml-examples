$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline
display_name: pipeline_with_hyperparameter_sweep
description: Tune hyperparameters using SVM component

settings:
default_compute: azureml:cpu-cluster

jobs:

sweep_step:
type: sweep
compute: azureml:cpu-cluster

```
inputs:
  data:
    path: wasbs://datasets@azuremlexamples.blob.core.windows.net/iris.csv
    type: uri_file
  degree: 3
  gamma: "scale"
  shrinking: False
  probability: False
  tol: 0.001
  cache_size: 1024
  verbose: False
  max_iter: -1
  decision_function_shape: "ovr"
  break_ties: False
  random_state: 42

outputs:
  model_output:
    type: mlflow_model
  test_data:
    type: uri_folder

sampling_algorithm: random

trial:
  command: >-
    python train.py
    --data ${{inputs.data}}
    --C ${{search_space.c_value}}
    --kernel ${{search_space.kernel}}
    --degree ${{inputs.degree}}
    --gamma ${{inputs.gamma}}
    --coef0 ${{search_space.coef0}}
    --shrinking ${{inputs.shrinking}}
    --probability ${{inputs.probability}}
    --tol ${{inputs.tol}}
    --cache_size ${{inputs.cache_size}}
    --verbose ${{inputs.verbose}}
    --max_iter ${{inputs.max_iter}}
    --decision_function_shape ${{inputs.decision_function_shape}}
    --break_ties ${{inputs.break_ties}}
    --random_state ${{inputs.random_state}}
    --model_output ${{outputs.model_output}}
    --test_data ${{outputs.test_data}}

  code: ./train-src
  environment: azureml://registries/azureml/environments/sklearn-1.5/labels/latest

  outputs:
    model_output:
      type: mlflow_model
    test_data:
      type: uri_folder

search_space:
  c_value:
    type: uniform
    min_value: 0.5
    max_value: 0.9
  kernel:
    type: choice
    values: ["rbf", "linear", "poly"]
  coef0:
    type: uniform
    min_value: 0.1
    max_value: 1

objective:
  goal: maximize
  primary_metric: training_accuracy_score

limits:
  max_trials: 5
  max_concurrent_trials: 3
  timeout: 7200

predict_step:
type: command

inputs:
  model: ${{parent.jobs.sweep_step.outputs.model_output}}
  test_data: ${{parent.jobs.sweep_step.outputs.test_data}}

outputs:
  predict_result:

component: ./predict.yml
