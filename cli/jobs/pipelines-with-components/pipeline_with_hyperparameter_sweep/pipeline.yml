$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline
display_name: pipeline_with_hyperparameter_sweep
description: Hyperparameter tuning pipeline

settings:
  default_compute: azureml:cpu-cluster

jobs:
  sweep_step:
    type: sweep
    inputs:
      data:
        type: uri_file
        path: wasbs://datasets@azuremlexamples.blob.core.windows.net/iris.csv
      degree: 3
      gamma: scale
      shrinking: false
      probability: false
      tol: 0.001
      cache_size: 1024
      verbose: false
      max_iter: -1
      decision_function_shape: ovr
      break_ties: false
      random_state: 42

    outputs:
      model_output:
      test_data:

    sampling_algorithm: random
    trial: ./train.yml

    search_space:
      c_value:
        type: uniform
        min_value: 0.5
        max_value: 1.5
      kernel:
        type: choice
        values: ["rbf", "linear", "poly"]
      coef0:
        type: uniform
        min_value: 0.0
        max_value: 1.0

    objective:
      primary_metric: training_f1_score
      goal: maximize

    limits:
      max_total_trials: 5
      max_concurrent_trials: 3
      timeout: 7200

  predict_step:
    type: command
    inputs:
      model: ${{parent.jobs.sweep_step.outputs.model_output}}
      test_data: ${{parent.jobs.sweep_step.outputs.test_data}}
    outputs:
      predict_result:
    component: ./predict.yml
